name: DemoApi deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Deploy a container app service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Azure login
        uses: Azure/login@v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install az containerapp extension
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --platform linux --tag erikmcl/demoapi:latest -f dockerfile .

      - name: Publish Docker image
        run: |
          docker push erikmcl/demoapi:latest

      - name: Deploy container App
        run: |
          az containerapp up --name demoapi --image erikmcl/demoapi:latest --resource-group rg-demo --environment demo-environment --ingress external --target-port 8080
